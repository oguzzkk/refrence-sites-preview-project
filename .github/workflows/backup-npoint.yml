name: Backup npoint data

# Her gün UTC 03:00 (Türkiye saatiyle 06:00) çalışır.
# Ayrıca Actions sekmesinden "Run workflow" ile manuel tetiklenebilir.
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# Workflow'un repo'ya commit/push yapabilmesi için yazma izni
permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch favorites and trash from npoint.io
        run: |
          mkdir -p backups
          curl -sS --fail -o backups/favorites.json https://api.npoint.io/9f430671be24a9b78c70
          curl -sS --fail -o backups/trash.json     https://api.npoint.io/8058a715b26b78972bd2

      - name: Validate JSON (npoint hatası varsa commit atlanır)
        run: |
          jq . backups/favorites.json > /dev/null
          jq . backups/trash.json > /dev/null

      - name: Pretty-print for readable diffs
        run: |
          jq . backups/favorites.json > backups/favorites.pretty.json
          jq . backups/trash.json     > backups/trash.pretty.json
          mv backups/favorites.pretty.json backups/favorites.json
          mv backups/trash.pretty.json     backups/trash.json

      - name: Write metadata
        run: |
          {
            echo "Last backup: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "Favorites count: $(jq 'length' backups/favorites.json)"
            echo "Trash count:     $(jq 'length' backups/trash.json)"
          } > backups/LAST_BACKUP.txt

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "backup: npoint data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
